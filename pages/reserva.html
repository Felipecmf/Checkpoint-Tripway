<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESERVA</title>


</head>

<body>
    <nav>
        <a href="../index.html">HOME</a>
        <ul style="display: flex; list-style: none; margin: 0; padding: 0; gap: 20px;">
            <li><a href="destinos.html">Destinos</a></li>
            <li><a href="pacotes.html">Pacotes e Serviços</a></li>
        </ul>   
    </nav>
    <header>
        <img src="../images/reserva.jpg" alt="img-header"  width="1320" height="220"> 
        <h1>Bem-vindo ao Tripway</h1>
        <p>Sua central de pacotes e planos de viagens</p>
    </header>

    <main>
        <section>
            <h2>Reserva</h2>

            <form>
                <label for="name">Nome Completo:</label>
                <br>
                <input type="text" id="name" placeholder="Ex: Tiago Ribeiro" required/>
                <br>
                <br>
                <label for="email">Email:</label>
                <br>
                <input type="email" id="email" placeholder="Ex: user@user.com" required/>
                <br>
                <br>
                <label for="carros">Destino:</label>
                <br>
                <select id="destino" name="destino" required>
                    <option value="paris">Paris</option>
                    <option value="ny">Nova York</option>
                    <option value="sao-francisco" selected>São Francisco</option>
                </select>
                <br>
                <p><b>Data:</b></p>
                <label for="ida" >Ida:</label>
                <input type="date" id="ida" required/>
                <label for="Volta">Volta:</label>
                <input type="date" id="volta" required/>
                <br>
                <br>
                <label for="n-pessoas">Número de pessoas:</label>
                <br>
                <input type="number" id="n-pessoas" required/>
                <br>
                <br>
                <label for="msg">Mensagem:</label>
                <br>
                <input type="text" id="msg" placeholder="Deixe uma observação aqui" required/>
                <br>
                <br>
                <br>
                <button>FAZER RESERVA</button>
            </form>
            
            <br>
            <br>

        <a href="../index.html">
            <img src="../images/return.jpg" alt="return"  width="40" height="25">
        </a>

      </section>
    </main>
    <footer>
        <p>© 2026 Tripway. Todos os direitos reservados.</p>
    </footer>
</body>
   
</html>
