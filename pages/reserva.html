<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESERVA</title>


</head>

<body>
    <main>
        <section>
            <h1>Reserva</h1>

            <form>
                <label for="name">Nome Completo:</label>
                <br>
                <input type="text" id="name" placeholder="Ex: Tiago Ribeiro" />
                <br>
                <br>
                <label for="email">Email:</label>
                <br>
                <input type="email" id="email" placeholder="Ex: user@user.com"/>
                <br>
                <br>
                <label for="carros">Destino:</label>
                <br>
                <select id="destino" name="destino">
                    <option value="paris">Paris</option>
                    <option value="ny">Nova York</option>
                    <option value="sao-francisco" selected>São Francisco</option>
                </select>
                <br>
                <p><b>Data</b></p>
                <label for="ida">Ida:</label>
                <input type="date" id="ida"/>
                <label for="Volta">Volta:</label>
                <input type="date" id="volta"/>


                <button>FAZER RESERVA</button>
            </form>


            
        <div>
            <p></p>
        </div>

        <a href="index.html">Voltar</a>
      </section>
    </main>
    
    
</body>

</html>
