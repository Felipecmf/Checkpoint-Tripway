<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESERVA</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/reserva.css">

</head>

<body>

    <nav>
        <a href="../index.html">HOME</a>
        <ul>
            <li><a href="destinos.html">Destinos</a></li>
            <li><a href="pacotes.html">Pacotes e Serviços</a></li>
            <li><a href="reserva.html">Reservas e Contato</a></li>
        </ul>
    </nav>

    <header>
        <h1>Reserva</h1>
        <p>Sua central de pacotes e planos de viagens</p>
    </header>

    <main>

        <section class="reserva">


            <p id="texto-reserva">
                Planeje sua próxima viagem com praticidade. Preencha o faremos a melhor reserva possível para você.
            </p>

            <form class="formulario">

                <div class="form-grupo">
                    <label for="name">Nome Completo</label>
                    <input type="text" id="name" placeholder="Ex: Tiago Ribeiro" required>
                </div>

                <div class="form-grupo">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Ex: user@user.com" required>
                </div>

                <div class="form-grupo">
                    <label for="destino">Destino</label>

                    <select id="destino" name="destino" required>
                        <option value="paris">Paris</option>
                        <option value="ny">Nova York</option>
                        <option value="sao-francisco" selected>São Francisco</option>
                    </select>
                </div>

                <div class="datas">

                    <div class="form-grupo">
                        <label for="ida">Ida</label>
                        <input type="date" id="ida" required>
                    </div>

                    <div class="form-grupo">
                        <label for="volta">Volta</label>
                        <input type="date" id="volta" required>
                    </div>

                </div>

                <div class="form-grupo">
                    <label for="n-pessoas">Número de pessoas</label>
                    <input type="number" id="n-pessoas" required>
                </div>

                <div class="form-grupo">
                    <label for="msg">Mensagem</label>
                    <textarea id="msg" placeholder="Deixe uma observação aqui"></textarea>
                </div>

                <button class="btn" type="submit">FAZER RESERVA</button>

            </form>

            
            <div class="img-final">
                <img src="../images/reserva.jpg" alt="Imagem de reserva de viagem">
            </div>

            <a href="../index.html" class="btn-voltar">← Voltar(Home)</a>

        </section>

    </main>

    <footer>
        <p>© 2026 TripWay. Todos os direitos reservados.</p>
    </footer>
